<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1C2333"/>
      <stop offset="1" stop-color="#0B0E14"/>
    </linearGradient>
    <linearGradient id="gold" x1="32" y1="4" x2="32" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F3E2B0"/>
      <stop offset="0.45" stop-color="#C4A862"/>
      <stop offset="1" stop-color="#8B7635"/>
    </linearGradient>
    <linearGradient id="blade" x1="32" y1="5" x2="32" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFBEF"/>
      <stop offset="1" stop-color="#D8BE78"/>
    </linearGradient>
  </defs>

  <!-- Badge -->
  <rect x="2" y="2" width="60" height="60" rx="15" fill="url(#bg)"/>
  <rect x="3.5" y="3.5" width="57" height="57" rx="13.5" fill="none" stroke="url(#gold)" stroke-width="2" stroke-opacity="0.9"/>

  <!-- Mountain range silhouette (Aurai wilderness) -->
  <path d="M6 50 L22 30 L31 40 L42 25 L52 38 L58 50 Z" fill="#C4A862" fill-opacity="0.30"/>
  <path d="M6 50 L22 30 L31 40 L42 25 L52 38 L58 50" fill="none" stroke="url(#gold)" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Standing blade -->
  <g>
    <!-- blade body -->
    <path d="M32 5 L37 13 L37 37 L32 43 L27 37 L27 13 Z" fill="url(#blade)" stroke="#8B7635" stroke-width="0.6"/>
    <!-- crossguard -->
    <path d="M17 42 L47 42 L43 47 L21 47 Z" fill="url(#gold)" stroke="#6E5A28" stroke-width="0.5" stroke-linejoin="round"/>
    <!-- grip -->
    <rect x="29.6" y="47" width="4.8" height="7" rx="1.6" fill="url(#gold)"/>
    <!-- pommel -->
    <circle cx="32" cy="56" r="3.4" fill="url(#gold)" stroke="#6E5A28" stroke-width="0.5"/>
  </g>
</svg>
